```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List Avançada</title>

<style>
:root {
  --bg: #ffffff;
  --text: #222;
  --card: #f4f4f4;
}

body.dark {
  --bg: #1e1e1e;
  --text: #ffffff;
  --card: #2c2c2c;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

.container {
  max-width: 700px;
  margin: auto;
}

h1 {
  text-align: center;
}

form {
  display: grid;
  gap: 10px;
}

input, select, button {
  padding: 10px;
  font-size: 14px;
}

button {
  cursor: pointer;
  border: none;
  background: #007bff;
  color: white;
}

.toggle-theme {
  margin-bottom: 15px;
}

.task {
  background: var(--card);
  padding: 10px;
  margin-top: 10px;
  border-left: 6px solid gray;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task.low { border-color: green; }
.task.medium { border-color: orange; }
.task.high { border-color: red; }

.task.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

.task-info {
  display: flex;
  flex-direction: column;
}

.actions button {
  margin-left: 5px;
}

.calendar {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>To-Do List Avançada</h1>

  <button class="toggle-theme" onclick="toggleTheme()">🌙 Alternar Tema</button>

  <form id="taskForm">
    <input type="text" id="taskInput" placeholder="Descrição da tarefa" required>

    <select id="priority">
      <option value="low">Baixa</option>
      <option value="medium">Média</option>
      <option value="high">Alta</option>
    </select>

    <input type="date" id="date">
    <input type="time" id="time">

    <button type="submit">Adicionar</button>
  </form>

  <div id="taskList"></div>

  <div class="calendar">
    <h3>Calendário</h3>
    <input type="date" id="calendarFilter" onchange="filterByDate()">
  </div>
</div>

<script>
const form = document.getElementById('taskForm');
const taskList = document.getElementById('taskList');
const calendarFilter = document.getElementById('calendarFilter');

let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

form.addEventListener('submit', e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: document.getElementById('taskInput').value,
    priority: document.getElementById('priority').value,
    date: document.getElementById('date').value,
    time: document.getElementById('time').value,
    completed: false
  };

  tasks.push(task);
  save();
  render();

  form.reset();
});

function save() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function render(filteredTasks = null) {
  taskList.innerHTML = '';
  const list = filteredTasks || tasks;

  list.forEach(task => {
    const div = document.createElement('div');
    div.className = `task ${task.priority} ${task.completed ? 'completed' : ''}`;

    const info = document.createElement('div');
    info.className = 'task-info';

    const day = task.date ? new Date(task.date).toLocaleDateString('pt-BR', { weekday: 'long' }) : '';

    info.innerHTML = `
      <strong>${task.text}</strong>
      <small>${task.date || ''} ${task.time || ''} ${day}</small>
    `;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const completeBtn = document.createElement('button');
    completeBtn.innerText = '✔';
    completeBtn.onclick = () => toggleComplete(task.id);

    const deleteBtn = document.createElement('button');
    deleteBtn.innerText = '🗑';
    deleteBtn.onclick = () => deleteTask(task.id);

    actions.appendChild(completeBtn);
    actions.appendChild(deleteBtn);

    div.appendChild(info);
    div.appendChild(actions);

    taskList.appendChild(div);
  });
}

function toggleComplete(id) {
  tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
  save();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function toggleTheme() {
  document.body.classList.toggle('dark');
}

function filterByDate() {
  const date = calendarFilter.value;
  if (!date) return render();
  const filtered = tasks.filter(t => t.date === date);
  render(filtered);
}

render();
</script>

</body>
</html>
