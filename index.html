<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List Completa</title>

<style>
:root {
  --bg: #ffffff;
  --text: #222;
  --card: #f4f4f4;
}

body.dark {
  --bg: #121212;
  --text: #ffffff;
  --card: #1e1e1e;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

.container {
  max-width: 750px;
  margin: auto;
}

h1 {
  text-align: center;
}

form {
  display: grid;
  gap: 10px;
}

input, select, button {
  padding: 10px;
  font-size: 14px;
}

button {
  cursor: pointer;
  border: none;
  background: #007bff;
  color: white;
}

.task {
  background: var(--card);
  margin-top: 10px;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 6px solid gray;
}

.task.low { border-color: green; }
.task.medium { border-color: orange; }
.task.high { border-color: red; }

.task.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

.info {
  display: flex;
  flex-direction: column;
}

.actions button {
  margin-left: 5px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>To-Do List Profissional</h1>

  <div class="top-bar">
    <button onclick="toggleTheme()">🌙 Alternar Tema</button>
  </div>

  <form id="form">
    <input type="text" id="taskInput" placeholder="Descrição da tarefa..." required>

    <select id="priority">
      <option value="low">Baixa</option>
      <option value="medium">Média</option>
      <option value="high">Alta</option>
    </select>

    <input type="date" id="date">
    <input type="time" id="time">

    <button type="submit">Adicionar</button>
  </form>

  <div id="list"></div>
</div>

<script>
const form = document.getElementById('form');
const list = document.getElementById('list');

let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

form.addEventListener('submit', e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: taskInput.value,
    priority: priority.value,
    date: date.value,
    time: time.value,
    done: false
  };

  tasks.push(task);
  save();
  render();
  form.reset();
});

function save() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function render() {
  list.innerHTML = '';

  tasks.forEach(task => {
    const el = document.createElement('div');
    el.className = `task ${task.priority} ${task.done ? 'completed' : ''}`;

    const info = document.createElement('div');
    info.className = 'info';

    let day = '';
    if (task.date) {
      day = new Date(task.date).toLocaleDateString('pt-BR', {
        weekday: 'long'
      });
    }

    info.innerHTML = `
      <strong>${task.text}</strong>
      <small>
        ${task.date || ''} 
        ${task.time || ''} 
        ${day}
      </small>
    `;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const doneBtn = document.createElement('button');
    doneBtn.innerText = '✔';
    doneBtn.onclick = () => toggle(task.id);

    const delBtn = document.createElement('button');
    delBtn.innerText = '🗑';
    delBtn.onclick = () => remove(task.id);

    actions.appendChild(doneBtn);
    actions.appendChild(delBtn);

    el.appendChild(info);
    el.appendChild(actions);

    list.appendChild(el);
  });
}

function toggle(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  save();
  render();
}

function remove(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function toggleTheme() {
  document.body.classList.toggle('dark');
}

render();
</script>

</body>
</html>
